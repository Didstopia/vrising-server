# version: "3"
services:

  vrising:

    # image: didstopia/vrising-server:latest
    build: .
    container_name: vrising
    restart: unless-stopped
    # restart: "no"

    environment:
      # Configure the server
      V_RISING_SERVER_PERSISTENT_DATA_PATH: "/app/vrising"
      V_RISING_SERVER_BRANCH: "public"
      # V_RISING_SERVER_START_MODE: "0" # Install/update and start server
      # V_RISING_SERVER_START_MODE: "1" # Install/update and exit
      V_RISING_SERVER_START_MODE: "2" # Install, skip update check and start server
      V_RISING_SERVER_UPDATE_MODE: "1" # Enable update checking

      # Customize the server
      V_RISING_SERVER_NAME: "V Rising Docker Test Server"
      V_RISING_SERVER_DESCRIPTION: "Test server."
      V_RISING_SERVER_GAME_PORT: 9876
      V_RISING_SERVER_QUERY_PORT: 9877
      V_RISING_SERVER_RCON_PORT: 9878
      V_RISING_SERVER_RCON_ENABLED: true
      V_RISING_SERVER_RCON_PASSWORD: "rc0n"
      V_RISING_SERVER_MAX_CONNECTED_USERS: 1
      V_RISING_SERVER_MAX_CONNECTED_ADMINS: 1
      V_RISING_SERVER_SAVE_NAME: "test_server"
      V_RISING_SERVER_PASSWORD: "t35t"
      V_RISING_SERVER_LIST_ON_MASTER_SERVER: false
      V_RISING_SERVER_LIST_ON_STEAM: false
      V_RISING_SERVER_LIST_ON_EOS: false
      V_RISING_SERVER_AUTO_SAVE_COUNT: 5
      V_RISING_SERVER_AUTO_SAVE_INTERVAL: 10
      V_RISING_SERVER_GAME_SETTINGS_PRESET: "StandardPvE"
      # Config management. false (default): edit the JSON under the mounted
      # /app/vrising/Settings yourself and it persists across restarts. true:
      # regenerate the config from these env vars every boot (overwrites edits).
      V_RISING_SERVER_DEFAULT_HOST_SETTINGS: false
      V_RISING_SERVER_DEFAULT_GAME_SETTINGS: false
      # Optional: merge arbitrary settings as JSON, applied last (wins over all).
      # Note: with a non-empty GameSettingsPreset the server reads the preset, not
      # ServerGameSettings.json, so set the preset to "" for game overrides to apply.
      # V_RISING_SERVER_HOST_SETTINGS_OVERRIDES: '{"ServerFps": 45, "LanMode": false}'
      # V_RISING_SERVER_GAME_SETTINGS_OVERRIDES: '{"CastleDecayRateModifier": 0.5}'
      # Cap Unity's job worker threads. Fixes the ">2048 Allocators registered"
      # -> 0xc0000005 -> wine stack overflow crash on high-core-count hosts
      # (e.g. a 28C/56T Xeon on TrueNAS Scale). Set to "" or 0 to let Unity
      # auto-detect (the old, crash-prone behaviour on big CPUs).
      V_RISING_SERVER_JOB_WORKER_COUNT: 8

      # Configure the user
      PUID: 0
      PGID: 0

    ports:
      - "9876:9876/udp"
      - "9877:9877/udp"
      - "9878:9878/tcp"

    volumes:
      - ./vrising_saves:/app/vrising
      - ./vrising_data:/steamcmd/vrising
      # - vrising_saves:/app/vrising_test
      # - vrising_data:/steamcmd/vrising

# volumes:
#   vrising_saves:
#     driver: local
#   vrising_data:
#     driver: local
